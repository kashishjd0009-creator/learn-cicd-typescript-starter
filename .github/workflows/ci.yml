name: ci

on: 
  pull_request:
    branches: [main]

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: Install dependencies
              # Add the --omit=optional flag
              run: npm ci --omit=optional
              
            - name: Run tests
              run: npm run test